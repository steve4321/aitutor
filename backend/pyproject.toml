[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
filterwarnings = ["ignore::DeprecationWarning"]

[tool.ruff]
extend-exclude = ["static", "scripts"]

[tool.coverage.run]
source = ["app"]
omit = ["tests/*", "app/models/*", "scripts/*"]

[tool.coverage.report]
fail_under = 70
show_missing = true
exclude_lines = ["pragma: no cover", "if TYPE_CHECKING:", "raise NotImplementedError"]
